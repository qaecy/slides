<!DOCTYPE html>
<html>
  <head>
    <script src="../../js/cytoscape.min.js"></script>
    <link rel="stylesheet" href="./default-styles.css" />
  </head>
  <body>
    <div id="cy"></div>
    <script type="module">
      import { isMobile } from "./helpers.js";
      import {
        appendHTMLLabels,
        logNodePositions,
        animateGraph,
        buildStyles,
      } from "../../js/cytoscape-helpers/index.mjs";

      const style = buildStyles();
      const padding = isMobile() ? 5 : 200;

      const cy = cytoscape({
        container: document.getElementById("cy"),
        style,
        layout: { name: "preset", padding },
        elements: {
          nodes: [
            {
              data: {
                id: "fc",
                label: "report.pdf",
                boxLabels: ["qcy:FileContent"],
              },
              position: { x: -110, y: -130 },
            },
            {
              data: {
                id: "page",
                label: "Page 2",
                boxLabels: ["qcy:DocumentPageFragment"],
              },
              position: { x: 0, y: 0 },
            },
            {
              data: {
                id: "img",
                label: "Figure 1",
                boxLabels: ["qcy:ImageFragment"],
              },
              position: { x: 0, y: 160 },
            },
            {
              data: {
                id: "pageSel",
                label: "PageSelector",
                boxLabels: ["qcy:PageSelector"],
              },
              position: { x: 200, y: -100 },
            },
            {
              data: {
                id: "pageVal",
                label: "2",
              },
              position: { x: 310, y: -40 },
              classes: "literal",
            },
            {
              data: {
                id: "xywhSel",
                label: "XYWHSelector",
                boxLabels: ["qcy:XYWHSelector"],
              },
              position: { x: -240, y: 60 },
            },
            {
              data: {
                id: "xywhVal",
                label: "xywh=100,200,300,200",
              },
              position: { x: -370, y: 150 },
              classes: "literal",
            },
          ],
          edges: [
            {
              data: {
                source: "fc",
                target: "page",
                label: "qcy:containsFragment",
              },
            },
            {
              data: {
                source: "page",
                target: "img",
                label: "qcy:containsFragment",
              },
            },
            {
              data: {
                source: "pageSel",
                target: "fc",
                label: "qcy:selectorSubject",
              },
            },
            {
              data: {
                source: "pageSel",
                target: "page",
                label: "qcy:selectorObject",
              },
            },
            {
              data: {
                source: "pageSel",
                target: "pageVal",
                label: "qcy:value",
              },
            },
            {
              data: {
                source: "xywhSel",
                target: "page",
                label: "qcy:selectorSubject",
              },
            },
            {
              data: {
                source: "xywhSel",
                target: "img",
                label: "qcy:selectorObject",
              },
            },
            {
              data: {
                source: "xywhSel",
                target: "xywhVal",
                label: "qcy:value",
              },
            },
          ],
        },
      });

      animateGraph(cy);
      appendHTMLLabels(cy, document.getElementById("cy"));
    </script>
  </body>
</html>
