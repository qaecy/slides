<!DOCTYPE html>
<html>
  <head>
    <script src="../../js/cytoscape.min.js"></script>
    <link rel="stylesheet" href="./default-styles.css" />
  </head>
  <body>
    <div id="cy"></div>
    <script type="module">
      import { isMobile } from "./helpers.js";
      import {
        appendHTMLLabels,
        logNodePositions,
        animateGraph,
        buildStyles,
      } from "../../js/cytoscape-helpers/index.mjs";

      const style = buildStyles();
      const padding = isMobile() ? 5 : 200;

      const cy = cytoscape({
        container: document.getElementById("cy"),
        style,
        layout: { name: "preset", padding },
        elements: {
          nodes: [
            {
              data: {
                id: "fc",
                label: "report.pdf",
                boxLabels: ["qcy:FileContent"],
              },
              position: { x: 0, y: -170 },
            },
            {
              data: {
                id: "page1",
                label: "Page 1",
                boxLabels: ["qcy:DocumentPageFragment"],
              },
              position: { x: -130, y: -40 },
            },
            {
              data: {
                id: "page2",
                label: "Page 2",
                boxLabels: ["qcy:DocumentPageFragment"],
              },
              position: { x: 130, y: -40 },
            },
            {
              data: {
                id: "text",
                label: "Paragraph",
                boxLabels: ["qcy:TextFragment"],
              },
              position: { x: -210, y: 110 },
            },
            {
              data: {
                id: "img",
                label: "Figure 1",
                boxLabels: ["qcy:ImageFragment"],
              },
              position: { x: -50, y: 110 },
            },
            {
              data: {
                id: "table",
                label: "Table 1",
                boxLabels: ["qcy:TableFragment"],
              },
              position: { x: 130, y: 110 },
            },
          ],
          edges: [
            {
              data: {
                source: "fc",
                target: "page1",
                label: "qcy:containsFragment",
              },
            },
            {
              data: {
                source: "fc",
                target: "page2",
                label: "qcy:containsFragment",
              },
            },
            {
              data: {
                source: "page1",
                target: "text",
                label: "qcy:containsFragment",
              },
            },
            {
              data: {
                source: "page1",
                target: "img",
                label: "qcy:containsFragment",
              },
            },
            {
              data: {
                source: "page2",
                target: "table",
                label: "qcy:containsFragment",
              },
            },
          ],
        },
      });

      animateGraph(cy);
      appendHTMLLabels(cy, document.getElementById("cy"));
    </script>
  </body>
</html>
