<!DOCTYPE html>
<html>
  <head>
    <script src="../../js/cytoscape.min.js"></script>
    <link rel="stylesheet" href="./default-styles.css" />
  </head>
  <body>
    <div id="cy"></div>
    <script type="module">
      import { isMobile } from "./helpers.js";
      import {
        appendHTMLLabels,
        logNodePositions,
        animateGraph,
        buildStyles,
      } from "../../js/cytoscape-helpers/index.mjs";

      const style = buildStyles();
      const padding = isMobile() ? 5 : 200;

      const cy = cytoscape({
        container: document.getElementById("cy"),
        style,
        layout: { name: "preset", padding },
        elements: {
          nodes: [
            {
              data: {
                id: "fc",
                label: "arch-model.ifc",
                boxLabels: ["qcy:FileContent"],
                properties: {
                  "qcy:md5Hash": "e939b0e66904...",
                  "qcy:mime": "application/x-step",
                  "qcy:sizeBytes": "176500000",
                  "qcy:openFormat": "true",
                },
              },
              position: { x: 0, y: 0 },
            },
            {
              data: {
                id: "mime",
                label: "BIM File Content",
                boxLabels: ["qcy:MimeCategory"],
              },
              position: { x: 230, y: -80 },
            },
            {
              data: {
                id: "cat",
                label: "Design Document",
                boxLabels: ["qcy:ContentCategory"],
              },
              position: { x: 230, y: 80 },
            },
          ],
          edges: [
            {
              data: {
                source: "fc",
                target: "mime",
                label: "qcy:hasMimeCategory",
              },
            },
            {
              data: {
                source: "fc",
                target: "cat",
                label: "qcy:hasContentCategory",
              },
            },
          ],
        },
      });

      animateGraph(cy);
      appendHTMLLabels(cy, document.getElementById("cy"));
    </script>
  </body>
</html>
