    <body>
        <div style="width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center;">
            <div style="width: 100%; max-width: 800px;" id="host"></div>
        </div>

        <script>
            // Create the element in JS so we can set required inputs BEFORE
            // it connects to the DOM (avoids NG0950 required-input errors).
            customElements.whenDefined('cue-block-project-documents').then(() => {
                const el = document.createElement('cue-block-project-documents');

                el.config = {
                    graphIsSaturated: false,
                    projectId: 'demo',
                    portalBaseURL: 'https://cue.qaecy.com',
                    privileges: {
                        canViewDocuments: true,
                        canDownloadDocuments: true,
                        canEditDocuments: false,
                        canDeleteDocuments: false,
                    },
                    handlers: {
                        subsequentBlockRequest: async (def) => {
                            console.log('[demo] subsequentBlockRequest', def);
                        },
                        requestDocumentsByFilter: async (filters) => {
                            console.log('[demo] requestDocumentsByFilter', filters);
                            return [];
                        },
                        documentDuplicatesRequest: async () => {
                            return {};
                        },
                    },
                };

                el.data = {
                    duplicateCount: 1,
                    documentsBySuffix: {
                        '.pdf': { size: 1024 * 1024 * 30, count: 8 },
                        '.ifc': { size: 1024 * 1024 * 10, count: 2 },
                        '.md': { size: 1024 * 1024 * 1, count: 1 },
                        '.dwg': { size: 1024 * 1024 * 1, count: 1 },
                    },
                    documentsByContentCategory: {
                        'qcy-e:DesignDocument': { size: 1024 * 1024 * 20, count: 4 },
                        'qcy-e:ComplianceReport': { size: 1024 * 1024 * 15, count: 3 },
                        'qcy-e:ContractualDocument': { size: 1024 * 1024 * 7, count: 2 },
                    },
                    availableContentCategories: [
                        { iri: 'qcy-e:DesignDocument', label: 'Design Document' },
                        {
                            iri: 'qcy-e:ComplianceReport',
                            label: 'Compliance Report',
                            parent: 'qcy-e:RegulatoryComplianceDocument',
                        },
                        { iri: 'qcy-e:ContractualDocument', label: 'Contractual & Legal Document' },
                        {
                            iri: 'qcy-e:RegulatoryComplianceDocument',
                            label: 'Regulatory & Compliance Document',
                        },
                    ],
                };

                // Only connect to DOM after all required inputs are set.
                document.getElementById('host').appendChild(el);
            });
        </script>
